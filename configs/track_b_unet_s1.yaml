experiment_id: 023_track_b_unet_s1
seed: 1
data:
  latents_file: data/latents/track_b_latents.pt
  split_file: data/manifests/track_b_splits.json
  split_dataset: gmd
  split_key: train
  seq_len: 172
  clip_seconds: 8.0
model:
  latent_channels: 64
  arch: unet1d
  embed_dim: 56
  depth: 6
  mlp_ratio: 2.0
  channel_mults: [1, 2, 2]
  blocks_per_level: 1
train:
  device: cuda
  bf16_autocast: true
  batch_size: 32
  num_workers: 2
  num_steps: 100000
  optimizer: adamw
  lr: 0.0002
  weight_decay: 0.03
  betas: [0.9, 0.9]
  warmup_steps: 1000
  log_every: 200
  ckpt_every: 10000
  sample_every: 10000
sampling:
  num_steps: 50
  num_samples: 8
paths:
  run_dir: experiments/023_track_b_unet_s1/runs
  ckpt_dir: experiments/023_track_b_unet_s1/checkpoints
  samples_dir: experiments/023_track_b_unet_s1/samples
