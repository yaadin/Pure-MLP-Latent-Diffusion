experiment_id: 010_track_a_lmlp_s1
seed: 1
data:
  latents_file: data/latents/track_a_latents.pt
  split_file: data/manifests/track_a_splits.json
  split_dataset: fsd50k
  split_key: train
  seq_len: 43
  clip_seconds: 2.0
model:
  latent_channels: 64
  arch: lmlp
  embed_dim: 128
  depth: 6
  mlp_ratio: 2.0
  merge_is_mlp: true
train:
  device: cuda
  bf16_autocast: true
  batch_size: 64
  num_workers: 2
  num_steps: 100000
  optimizer: adamw
  lr: 0.0002
  weight_decay: 0.03
  betas: [0.9, 0.9]
  warmup_steps: 1000
  log_every: 200
  ckpt_every: 10000
  sample_every: 10000
sampling:
  num_steps: 50
  num_samples: 8
paths:
  run_dir: experiments/010_track_a_lmlp_s1/runs
  ckpt_dir: experiments/010_track_a_lmlp_s1/checkpoints
  samples_dir: experiments/010_track_a_lmlp_s1/samples
