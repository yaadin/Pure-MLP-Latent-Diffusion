experiment_id: 020_track_b_lmlp_s3
seed: 3
data:
  latents_file: data/latents/track_b_latents.pt
  split_file: data/manifests/track_b_splits.json
  split_dataset: gmd
  split_key: train
  seq_len: 172
  clip_seconds: 8.0
model:
  latent_channels: 64
  arch: lmlp
  embed_dim: 128
  depth: 6
  mlp_ratio: 2.0
  merge_is_mlp: true
train:
  device: cuda
  bf16_autocast: true
  batch_size: 32
  num_workers: 2
  num_steps: 100000
  optimizer: adamw
  lr: 0.0002
  weight_decay: 0.03
  betas: [0.9, 0.9]
  warmup_steps: 1000
  log_every: 200
  ckpt_every: 10000
  sample_every: 10000
sampling:
  num_steps: 50
  num_samples: 8
paths:
  run_dir: experiments/020_track_b_lmlp_s3/runs
  ckpt_dir: experiments/020_track_b_lmlp_s3/checkpoints
  samples_dir: experiments/020_track_b_lmlp_s3/samples
